<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Honeymoon 2026 — Mando & Rim</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --card: #334155; --card-hover: #3b4d66;
    --border: #475569; --text: #f1f5f9; --muted: #94a3b8; --accent: #f59e0b;
    --beach: #38bdf8; --mountain: #4ade80; --city: #c084fc; --ryokan: #fbbf24;
    --cultural: #fb923c; --travel: #94a3b8; --scenic: #2dd4bf;
    --sidebar-w: 400px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 20px; flex-shrink: 0; z-index: 1000;
  }
  header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  header h1 span { color: var(--accent); }
  .header-stats { display: flex; gap: 16px; font-size: 12px; color: var(--muted); }
  .header-stats .stat { display: flex; align-items: center; gap: 4px; }
  .header-actions { display: flex; gap: 8px; }
  .header-actions button {
    padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); cursor: pointer; font-size: 12px;
    transition: all 0.2s;
  }
  .header-actions button:hover { background: var(--card-hover); }

  .main { display: flex; flex: 1; overflow: hidden; }

  #sidebar {
    width: var(--sidebar-w); background: var(--surface); overflow-y: auto;
    border-right: 1px solid var(--border); flex-shrink: 0; scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #sidebar::-webkit-scrollbar { width: 6px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .day-card {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: all 0.2s; position: relative;
  }
  .day-card:hover { background: var(--card); }
  .day-card.active { background: var(--card); border-left: 3px solid var(--accent); }
  .day-card-header { display: flex; align-items: center; gap: 10px; }
  .day-num {
    width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  .day-info { flex: 1; min-width: 0; }
  .day-date { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .day-title { font-size: 14px; font-weight: 600; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .type-badge {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
    text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
  }
  .day-driving { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; align-items: center; gap: 4px; }

  .day-detail {
    max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
  }
  .day-card.active .day-detail { max-height: 2000px; }
  .day-detail-inner { padding: 12px 0 4px; }

  .detail-image {
    width: 100%; height: 180px; border-radius: 8px; overflow: hidden;
    background: var(--bg); position: relative; margin-bottom: 12px;
  }
  .detail-image img {
    width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s;
  }
  .detail-image .img-placeholder {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--muted); position: absolute; top: 0; left: 0;
  }

  .detail-section { margin-bottom: 12px; }
  .detail-section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 6px;
  }
  .detail-section ul { list-style: none; padding: 0; }
  .detail-section li {
    font-size: 13px; padding: 3px 0; padding-left: 16px; position: relative; line-height: 1.5;
  }
  .detail-section li::before {
    content: ''; position: absolute; left: 0; top: 10px; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent);
  }
  .detail-section.food li::before { background: var(--cultural); }
  .detail-section.photo li::before { background: var(--city); }

  .detail-accommodation {
    background: var(--bg); border-radius: 8px; padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
  }
  .detail-accommodation .name { font-size: 13px; font-weight: 500; }
  .detail-accommodation .price { font-size: 14px; font-weight: 700; color: var(--accent); }
  .detail-accommodation .accom-type { font-size: 11px; color: var(--muted); }

  .accom-options-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .accom-option {
    background: var(--bg); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    border: 1px solid var(--border); transition: all 0.2s; position: relative;
  }
  .accom-option.recommended { border-color: var(--accent); }
  .accom-option .ao-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .accom-option .ao-rank {
    width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0;
    background: var(--card); color: var(--muted);
  }
  .accom-option.recommended .ao-rank { background: var(--accent); color: #000; }
  .accom-option .ao-name { font-size: 13px; font-weight: 600; flex: 1; }
  .accom-option .ao-price { font-size: 14px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .accom-option .ao-price-jpy { font-size: 10px; color: var(--muted); font-weight: 400; }
  .accom-option .ao-details { font-size: 11px; color: var(--muted); line-height: 1.6; padding-left: 30px; }
  .accom-option .ao-details .ao-row { display: flex; align-items: flex-start; gap: 6px; }
  .accom-option .ao-details .ao-icon { flex-shrink: 0; width: 14px; text-align: center; }
  .accom-option .ao-details .ao-highlight { color: var(--text); font-weight: 500; }
  .accom-option { cursor: pointer; transition: all 0.2s; }
  .accom-option:hover { border-color: var(--muted); }
  .accom-option.selected { border-color: var(--mountain); background: rgba(74,222,128,0.06); }
  .accom-option.recommended.selected { border-color: var(--accent); background: rgba(245,158,11,0.06); }
  .ao-actions { display: flex; gap: 6px; padding-left: 30px; margin-top: 8px; }
  .ao-btn-select {
    padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: var(--card); color: var(--muted);
    cursor: pointer; transition: all 0.2s;
  }
  .ao-btn-select:hover { border-color: var(--mountain); color: var(--mountain); }
  .ao-btn-select.active { background: var(--mountain); color: #000; border-color: var(--mountain); }
  .ao-btn-book {
    padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 500;
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    cursor: pointer; text-decoration: none; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .ao-btn-book:hover { border-color: var(--accent); color: var(--accent); }
  .booking-book-link {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
    border-radius: 6px; font-size: 11px; font-weight: 500; text-decoration: none;
    background: var(--bg); color: var(--accent); border: 1px solid var(--accent);
    transition: all 0.2s; margin-left: 8px;
  }
  .booking-book-link:hover { background: var(--accent); color: #000; }

  .detail-links { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .detail-links a {
    padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 500;
    text-decoration: none; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    transition: all 0.2s; display: flex; align-items: center; gap: 4px;
  }
  .detail-links a:hover { background: var(--card-hover); border-color: var(--accent); }

  #map { flex: 1; z-index: 1; }
  .leaflet-container { background: var(--bg); }

  .custom-marker {
    width: 28px; height: 28px; border-radius: 50%; border: 3px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    transition: transform 0.2s;
  }
  .custom-marker:hover { transform: scale(1.2); }
  .custom-marker.active { transform: scale(1.3); box-shadow: 0 0 0 4px rgba(245,158,11,0.4); }

  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7);
    z-index: 2000; display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border-radius: 16px; padding: 32px; max-width: 700px;
    width: 90%; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border);
  }
  .modal h2 { font-size: 20px; margin-bottom: 20px; }
  .modal-close {
    position: absolute; top: 16px; right: 20px; background: none; border: none;
    color: var(--text); font-size: 24px; cursor: pointer;
  }
  .budget-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .budget-table th { text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); color: var(--muted); font-size: 11px; text-transform: uppercase; }
  .budget-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .budget-table .total td { font-weight: 700; border-top: 2px solid var(--accent); color: var(--accent); font-size: 15px; }
  .budget-bar { height: 8px; border-radius: 4px; background: var(--bg); margin-top: 4px; overflow: hidden; }
  .budget-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

  .checklist-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .checklist-item input[type="checkbox"] { margin-top: 3px; accent-color: var(--accent); width: 16px; height: 16px; }
  .checklist-item label { font-size: 13px; line-height: 1.5; cursor: pointer; }
  .checklist-item.checked label { text-decoration: line-through; color: var(--muted); }
  .checklist-section { margin-bottom: 20px; }
  .checklist-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--accent); }

  /* Bookings Tracker */
  .booking-progress { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
  .booking-progress-bar { height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; margin: 10px 0; }
  .booking-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--mountain)); border-radius: 5px; transition: width 0.5s; }
  .booking-progress-stats { display: flex; gap: 24px; font-size: 13px; flex-wrap: wrap; }
  .booking-progress-stats .bp-stat { display: flex; flex-direction: column; gap: 2px; }
  .booking-progress-stats .bp-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .booking-progress-stats .bp-value { font-weight: 700; font-size: 16px; }
  .booking-progress-stats .bp-value.accent { color: var(--accent); }

  .booking-group { margin-bottom: 24px; }
  .booking-group-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .booking-group-title .priority {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
  }
  .priority-now { background: #ef444433; color: #f87171; }
  .priority-soon { background: #f59e0b33; color: #fbbf24; }
  .priority-later { background: #22c55e33; color: #4ade80; }

  .booking-item {
    background: var(--card); border-radius: 10px; padding: 14px 16px; margin-bottom: 8px;

  .booking-item.done { border-left-color: var(--mountain); opacity: 0.8; }
  .booking-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .booking-item-header input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--mountain); cursor: pointer; flex-shrink: 0; }
  .booking-item-header .bi-text { flex: 1; font-size: 14px; font-weight: 500; }
  .booking-item-header .bi-est { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .booking-item.done .bi-text { text-decoration: line-through; color: var(--muted); }
  .booking-item-details { font-size: 12px; color: var(--muted); margin-bottom: 8px; padding-left: 28px; }
  .booking-inputs { display: flex; gap: 8px; padding-left: 28px; flex-wrap: wrap; }
  .booking-inputs .bi-field { display: flex; flex-direction: column; gap: 3px; }
  .booking-inputs .bi-field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
  .booking-inputs .bi-field input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; color: var(--text); font-size: 13px; font-family: inherit;
    transition: border-color 0.2s;
  }
  .booking-inputs .bi-field input:focus { outline: none; border-color: var(--accent); }
  .booking-inputs .bi-field input.price-input { width: 110px; }
  .booking-inputs .bi-field input.conf-input { width: 160px; }
  .booking-inputs .bi-field input.notes-input { width: 220px; }

  .modal-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
  .modal-tabs button {
    padding: 10px 20px; border: none; background: none; color: var(--muted);
    font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: all 0.2s;
  }
  .modal-tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }

  @media (max-width: 768px) {
    .main { flex-direction: column; }
    #sidebar { width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
    #map { height: 55vh; }
    .header-stats { display: none; }
    header { padding: 10px 16px; gap: 10px; }
    .modal { padding: 20px; }
  }
</style>
</head>

<script>
// --- Supabase setup ---
const SUPABASE_URL = 'https://drfytajbstwiookwbxsv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YCpu9qa6RJoxiWvRyEoOnA_N1Ckydfx';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// In-memory caches (replaces localStorage)
let _accomPicks = {};
let _bookingData = {};
let _checklistData = {};

async function loadAllData() {
  const [accom, bookings, checklist] = await Promise.all([
    sb.from('accom_picks').select('*'),
    sb.from('bookings').select('*'),
    sb.from('checklist').select('*'),
  ]);
  if (accom.data) accom.data.forEach(r => { _accomPicks[r.day] = r.rank; });
  if (bookings.data) bookings.data.forEach(r => {
    _bookingData[r.id] = { done: r.done, actual: r.actual, notes: r.notes, conf: r.conf, checkinTime: r.checkin_time, checkoutTime: r.checkout_time };
  });
  if (checklist.data) checklist.data.forEach(r => { _checklistData[r.id] = r.checked; });
}

// Realtime subscriptions for cross-device sync
function setupRealtime() {
  sb.channel('sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'accom_picks' }, (payload) => {
      if (payload.new) _accomPicks[payload.new.day] = payload.new.rank;
      if (payload.old && payload.eventType === 'DELETE') delete _accomPicks[payload.old.day];
      renderSidebar(); updateHeaderStats();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'bookings' }, (payload) => {
      if (payload.new) _bookingData[payload.new.id] = { done: payload.new.done, actual: payload.new.actual, notes: payload.new.notes, conf: payload.new.conf, checkinTime: payload.new.checkin_time, checkoutTime: payload.new.checkout_time };
      if (payload.old && payload.eventType === 'DELETE') delete _bookingData[payload.old.id];
      renderBookings();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'checklist' }, (payload) => {
      if (payload.new) _checklistData[payload.new.id] = payload.new.checked;
      if (payload.old && payload.eventType === 'DELETE') delete _checklistData[payload.old.id];
      renderChecklist();
    })
    .subscribe();
}

  if (ev) { ev.stopPropagation(); ev.preventDefault(); }

  sb.from('accom_picks').upsert({ day: String(day), rank, updated_at: new Date().toISOString() }).then();
  renderSidebar();
  updateHeaderStats();
}
function getSelectedOption(dayNum) {
  const picks = getAccomPicks();
  const dayData = getDays().find(d => d.day === dayNum);
  if (!dayData?.accomOptions) return null;
  const rank = picks[dayNum] || 1;
  return dayData.accomOptions.find(o => o.rank === rank) || dayData.accomOptions[0];
}

  }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);
}

function getMarkerIcon(day, isActive) {
  const color = TYPE_COLORS[day.type] || '#94a3b8';
  return L.divIcon({
    className: 'custom-marker-wrap',
    html: `<div class="custom-marker ${isActive?'active':''}" style="background:${color}">${day.day}</div>`,
    iconSize: [28, 28], iconAnchor: [14, 14]
  });
}

function renderMap() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (routeLine) map.removeLayer(routeLine);

  const days = getDays();
  const coords = [];

  days.forEach(day => {
    const marker = L.marker(day.coords, { icon: getMarkerIcon(day, activeDay === day.day) })
      .addTo(map)
      .bindTooltip(`Day ${day.day}: ${day.title}`, { direction: 'top', offset: [0, -16] })
      .on('click', () => selectDay(day.day));
    markers.push(marker);
    coords.push(day.coords);
  });

  // Deduplicate consecutive same coords for cleaner line
  const lineCoords = [coords[0]];
  for (let i = 1; i < coords.length; i++) {
    if (coords[i][0] !== coords[i-1][0] || coords[i][1] !== coords[i-1][1]) {
      lineCoords.push(coords[i]);
    }
  }

  routeLine = L.polyline(lineCoords, {
    color: '#f59e0b', weight: 3, opacity: 0.6, dashArray: '8 6'
  }).addTo(map);

  if (!activeDay) {
    map.fitBounds(L.latLngBounds(coords), { padding: [40, 40] });
  }
}

function selectDay(dayNum) {
  if (activeDay === dayNum) { activeDay = null; }
  else { activeDay = dayNum; }

  renderSidebar();
  renderMap();

  if (activeDay) {
    const day = getDays().find(d => d.day === dayNum);
    map.flyTo(day.coords, day.type === 'travel' ? 10 : 12, { duration: 0.8 });

    setTimeout(() => {
      const el = document.getElementById(`day-${dayNum}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);

    loadImage(dayNum, day.wiki);
  }
}

async function loadImage(dayNum, wikiTitle) {
  if (imageCache[wikiTitle]) {
    setImage(dayNum, imageCache[wikiTitle]);
    return;
  }
  try {
    const resp = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`);
    const data = await resp.json();
    const url = data.originalimage?.source || data.thumbnail?.source;
    if (url) {
      imageCache[wikiTitle] = url;
      setImage(dayNum, url);
    }
  } catch(e) { /* keep placeholder */ }
}

function setImage(dayNum, url) {
  const container = document.getElementById(`img-${dayNum}`);
  if (!container) return;
  const img = document.createElement('img');
  img.src = url;
  img.alt = '';
  img.style.opacity = '0';
  img.onload = () => { img.style.opacity = '1'; };
  const placeholder = container.querySelector('.img-placeholder');
  if (placeholder) placeholder.style.display = 'none';
  container.appendChild(img);
}

function updateHeaderStats() {
  const days = getDays();
  const picks = getAccomPicks();
  const totalAccom = days.reduce((s, d) => {
    if (d.accomOptions) {
      const r = picks[d.day] || 1;
      const opt = d.accomOptions.find(o => o.rank === r);
      return s + (opt ? opt.price : d.accom.price);
    }
    if (d.accom.linkedDay) {
      const lopt = getSelectedOption(d.accom.linkedDay);
      return s + (lopt ? lopt.price : d.accom.price);
    }
    return s + d.accom.price;
  }, 0);
  const beachDays = days.filter(d => d.type === 'beach').length;
  const ryokanNights = days.filter(d => d.accom.type.toLowerCase().includes('ryokan')).length;
  const drivingDays = days.filter(d => d.driving && !d.driving.includes('None')).length;

  document.getElementById('headerStats').innerHTML = `
    <div class="stat">&#128197; ${days.length} days</div>
    <div class="stat">&#127754; ${beachDays} beach</div>
    <div class="stat">&#9832; ${ryokanNights} ryokan</div>

}

function getBookingData() {
  return _bookingData;
}
function saveBookingData(data) {
  _bookingData = data;
}
function saveField(id, field, value) {
  if (!_bookingData[id]) _bookingData[id] = {};
  if (field === 'actual') {
    _bookingData[id][field] = value === '' ? null : parseFloat(value);
  } else if (field === 'done') {
    _bookingData[id][field] = value;
  } else {
    _bookingData[id][field] = value;
  }
  const d = _bookingData[id];
  const row = { id, done: d.done || false, actual: d.actual || null, notes: d.notes || null, conf: d.conf || null, checkin_time: d.checkinTime || null, checkout_time: d.checkoutTime || null, updated_at: new Date().toISOString() };
  sb.from('bookings').upsert(row).then();
  refreshProgress();
}
function getEffectiveEst(item) {
  const m = BOOKING_DAY_MAP[item.id];
  if (m) { const o = getSelectedOption(m.day); if (o) return o.price * m.nights; }
  return item.est;
}
function refreshProgress() {
  const data = getBookingData();
  const allItems = BOOKINGS.flatMap(g => g.items);
  const doneCount = allItems.filter(i => data[i.id]?.done).length;
  const totalEst = allItems.reduce((s, i) => s + getEffectiveEst(i), 0);
  const totalActual = allItems.reduce((s, i) => s + (parseFloat(data[i.id]?.actual) || 0), 0);
  const totalBooked = allItems.filter(i => data[i.id]?.done).reduce((s, i) => {
    const a = parseFloat(data[i.id]?.actual);
    return s + (a > 0 ? a : getEffectiveEst(i));
  }, 0);
  const pct = Math.round((doneCount / allItems.length) * 100);
  const el = (id) => document.getElementById(id);
  if (el('bp-count')) el('bp-count').textContent = `${doneCount} of ${allItems.length} booked`;
  if (el('bp-pct')) el('bp-pct').textContent = `${pct}%`;
  if (el('bp-bar')) el('bp-bar').style.width = pct + '%';
  if (el('bp-est')) el('bp-est').textContent = `CA$${totalEst.toLocaleString()}`;
  if (el('bp-actual')) el('bp-actual').textContent = totalActual > 0 ? `CA$${totalActual.toLocaleString()}` : '\u2014';
  if (el('bp-remain')) el('bp-remain').textContent = `CA$${(totalEst - totalBooked).toLocaleString()}`;
  if (el('bp-savings')) {
    el('bp-savings').textContent = totalActual > 0 ? (totalActual < totalEst ? '-CA$' + (totalEst - totalActual).toLocaleString() : '+CA$' + (totalActual - totalEst).toLocaleString()) : '\u2014';
    el('bp-savings').style.color = totalActual > 0 && totalActual < totalEst ? 'var(--mountain)' : 'var(--muted)';
  }
}

  const data = getBookingData();
  const allItems = BOOKINGS.flatMap(g => g.items);
  const doneCount = allItems.filter(i => data[i.id]?.done).length;
  const totalEst = allItems.reduce((s, i) => s + getEffectiveEst(i), 0);
  const totalActual = allItems.reduce((s, i) => s + (parseFloat(data[i.id]?.actual) || 0), 0);
  const totalBooked = allItems.filter(i => data[i.id]?.done).reduce((s, i) => {
    const a = parseFloat(data[i.id]?.actual);
    return s + (a > 0 ? a : getEffectiveEst(i));
  }, 0);
  const pct = Math.round((doneCount / allItems.length) * 100);

  document.getElementById('bookingsContent').innerHTML = `
    <h2>Bookings Tracker</h2>
    <div class="booking-progress">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span id="bp-count" style="font-size:14px;font-weight:600">${doneCount} of ${allItems.length} booked</span>
        <span id="bp-pct" style="font-size:14px;font-weight:700;color:var(--accent)">${pct}%</span>
      </div>
      <div class="booking-progress-bar">
        <div id="bp-bar" class="booking-progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="booking-progress-stats">
        <div class="bp-stat"><span class="bp-label">Estimated Total</span><span id="bp-est" class="bp-value">CA$${totalEst.toLocaleString()}</span></div>
        <div class="bp-stat"><span class="bp-label">Actual Spent</span><span id="bp-actual" class="bp-value accent">CA$${totalActual > 0 ? totalActual.toLocaleString() : '\u2014'}</span></div>
        <div class="bp-stat"><span class="bp-label">Remaining (est.)</span><span id="bp-remain" class="bp-value">CA$${(totalEst - totalBooked).toLocaleString()}</span></div>
        <div class="bp-stat"><span class="bp-label">Savings vs Est.</span><span id="bp-savings" class="bp-value" style="color:${totalActual > 0 && totalActual < totalEst ? 'var(--mountain)' : 'var(--muted)'}">${totalActual > 0 ? (totalActual < totalEst ? '-CA$' + (totalEst - totalActual).toLocaleString() : '+CA$' + (totalActual - totalEst).toLocaleString()) : '\u2014'}</span></div>
      </div>
    </div>

    ${BOOKINGS.map(group => `
      <div class="booking-group">
        <div class="booking-group-title">
          ${group.group}
          <span class="priority priority-${group.priority}">${group.priorityLabel}</span>
        </div>
        ${group.items.map(item => {
          const d = data[item.id] || {};
          const isAccom = !!item.checkin;
          const _map = BOOKING_DAY_MAP[item.id];
          const _sel = _map ? getSelectedOption(_map.day) : null;
          const _text = _sel ? item.text.split('\u2014')[0].trim() + ' \u2014 ' + _sel.name + (_map.nights > 1 ? ' (' + _map.nights + ' nights)' : '') : item.text;
          const _est = _sel ? _sel.price * _map.nights : item.est;
          const _bUrl = _sel ? (_sel.url || bookUrl(_sel.name, _map.day)) : null;
          return `
          <div class="booking-item ${d.done ? 'done' : ''}">
            <div class="booking-item-header">
              <input type="checkbox" ${d.done ? 'checked' : ''} onchange="handleCheckbox('${item.id}',this)">
              <span class="bi-text">${_text}</span>
              <span class="bi-est">Est: CA$${_est.toLocaleString()}</span>
              ${_bUrl ? '<a class="booking-book-link" href="' + _bUrl + '" target="_blank">Book \u2192</a>' : ''}
            </div>
            ${isAccom ? `
            <div style="padding-left:28px;margin-bottom:6px;display:flex;gap:16px;flex-wrap:wrap;align-items:center">
              <div style="font-size:12px">
                <span style="color:var(--mountain);font-weight:600">Check-in:</span>
                <span style="color:var(--text)">${item.checkin}</span>
              </div>
              <span style="color:var(--muted)">\u2192</span>
              <div style="font-size:12px">
                <span style="color:var(--cultural);font-weight:600">Check-out:</span>
                <span style="color:var(--text)">${item.checkout}</span>
              </div>
              <span style="font-size:11px;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:6px">${item.nights} night${item.nights > 1 ? 's' : ''}</span>
            </div>` : ''}
            <div class="booking-item-details">${item.detail}</div>
            <div class="booking-inputs">
              <div class="bi-field">
                <label>Actual Price (CAD)</label>
                <input type="number" class="price-input" placeholder="0.00" value="${d.actual != null ? d.actual : ''}" onchange="saveField('${item.id}','actual',this.value)">
              </div>
              <div class="bi-field">
                <label>Confirmation #</label>
                <input type="text" class="conf-input" placeholder="Booking ref..." value="${d.conf || ''}" onchange="saveField('${item.id}','conf',this.value)">
              </div>
              ${isAccom ? `
              <div class="bi-field">
                <label>Check-in Time</label>
                <input type="time" style="width:110px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px;font-family:inherit" value="${d.checkinTime || ''}" onchange="saveField('${item.id}','checkinTime',this.value)">
              </div>
              <div class="bi-field">
                <label>Check-out Time</label>
                <input type="time" style="width:110px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px;font-family:inherit" value="${d.checkoutTime || ''}" onchange="saveField('${item.id}','checkoutTime',this.value)">
              </div>` : ''}
              <div class="bi-field">
                <label>Notes</label>
                <input type="text" class="notes-input" placeholder="Any notes..." value="${d.notes || ''}" onchange="saveField('${item.id}','notes',this.value)">
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `).join('')}

    <div style="display:flex;gap:8px;margin-top:16px">
      <button onclick="closeModals()" style="padding:10px 20px;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:600">Close</button>
      <button onclick="exportBookings()" style="padding:10px 20px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-weight:500;font-size:12px">Copy Summary</button>
      <button onclick="if(confirm('Clear all booking data? This cannot be undone.')){sb.from('bookings').delete().neq('id','__none__').then(()=>{_bookingData={};renderBookings()})}" style="padding:10px 20px;background:none;color:var(--muted);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-weight:500;font-size:12px">Reset All</button>
    </div>
  `;
}

function exportBookings() {
  const data = getBookingData();
  const lines = ['JAPAN HONEYMOON 2026 \u2014 BOOKING STATUS\n'];
  BOOKINGS.forEach(group => {
    lines.push(`\n## ${group.group}`);
    group.items.forEach(item => {
      const d = data[item.id] || {};
      const status = d.done ? '\u2705' : '\u2B1C';
      const price = d.actual ? `CA$${d.actual}` : `~CA$${item.est} (est.)`;
      const conf = d.conf ? ` | Conf: ${d.conf}` : '';
      const dates = item.checkin ? ` | ${item.checkin} \u2192 ${item.checkout}` : '';
      const times = d.checkinTime ? ` | In: ${d.checkinTime}` : '';
      const timesOut = d.checkoutTime ? ` Out: ${d.checkoutTime}` : '';
      lines.push(`${status} ${item.text} \u2014 ${price}${conf}${dates}${times}${timesOut}`);
    });
  });
  const allItems = BOOKINGS.flatMap(g => g.items);
  const totalActual = allItems.reduce((s, i) => s + (parseFloat(data[i.id]?.actual) || 0), 0);
  const totalEst = allItems.reduce((s, i) => s + i.est, 0);
  const doneCount = allItems.filter(i => data[i.id]?.done).length;
  lines.push(`\n---\nProgress: ${doneCount}/${allItems.length} | Est: CA$${totalEst.toLocaleString()} | Actual: CA$${totalActual > 0 ? totalActual.toLocaleString() : 'TBD'}`);
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Summary', 2000);
  });
}

function renderChecklist() {
  const saved = _checklistData;
  const sections = [
    { title: 'Apps to Download', items: [
      { id:'gmaps', text:'Google Maps — download Japan offline maps for mountain areas' },
      { id:'gtranslate', text:'Google Translate — download Japanese offline pack + use camera translate' },
      { id:'suica', text:'Set up Suica/Pasmo in Apple Wallet (for any train rides in cities)' },
      { id:'tabelog', text:'Tabelog or Google Maps for restaurant reviews (Tabelog is Japan\'s Yelp)' },
    ]},
    { title: 'Packing — Camera Gear', items: [
      { id:'xh2s', text:'Fujifilm X-H2S body' },
      { id:'lens35', text:'XF 35mm f/1.4 (low light / street / food)' },
      { id:'lenswide', text:'Wide angle lens (landscapes, interiors)' },
      { id:'lens50', text:'XF 50mm f/2 or 56mm (portraits, Fuji compression shots)' },
      { id:'batt', text:'3x spare batteries (heat drains them faster)' },
      { id:'nd', text:'ND filter for waterfall long exposures (Shiraito Falls, etc.)' },
      { id:'tripod', text:'Small tripod or GorillaPod (dawn Fuji shots, night photography)' },
      { id:'wp', text:'Waterproof bag or housing (snorkeling photos at Hirizo/Kerama)' },
      { id:'cloth', text:'Lens cloth x3 (humidity causes constant fogging between AC car and outdoors)' },
      { id:'cards', text:'Spare SD cards' },
    ]},
    { title: 'Packing — Clothing & Essentials', items: [
      { id:'light', text:'Light breathable fabrics (linen, moisture-wicking) — it\'s 30-35C with 70%+ humidity' },
      { id:'layer', text:'1 light layer for mountains (Alps are 20-25C)' },
      { id:'swim', text:'Swimsuit x2 (one to wear, one to dry)' },
      { id:'shoes', text:'Comfortable walking shoes + sandals/water shoes' },
      { id:'rain', text:'Compact rain jacket or umbrella' },
      { id:'towel', text:'Quick-dry towel' },
      { id:'sun', text:'Sunscreen + hat (mountain sun is intense)' },
      { id:'bug', text:'Insect repellent (mountain/river areas)' },
      { id:'rash', text:'Rash guard (jellyfish protection in ocean swimming)' },
      { id:'cash', text:'Cash plan — Japan is still cash-heavy; withdraw at 7-Eleven ATMs' },
      { id:'docs', text:'Passport + IDP + Canadian license (carry all three always)' },
    ]},
  ];

  document.getElementById('checklistContent').innerHTML = `
    <h2>Packing List</h2>
    ${sections.map(s => `
      <div class="checklist-section">
        <h3>${s.title}</h3>
        ${s.items.map(item => `
          <div class="checklist-item ${saved[item.id] ? 'checked' : ''}">
            <input type="checkbox" id="chk-${item.id}" ${saved[item.id]?'checked':''} onchange="toggleCheck('${item.id}', this.checked)">
            <label for="chk-${item.id}">${item.text}</label>
          </div>
        `).join('')}
      </div>
    `).join('')}
    <button onclick="closeModals()" style="margin-top:16px;padding:10px 20px;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:600">Close</button>
  `;
}

function toggleCheck(id, checked) {
  _checklistData[id] = checked;
  sb.from('checklist').upsert({ id, checked, updated_at: new Date().toISOString() }).then();
  const item = document.querySelector(`#chk-${id}`).closest('.checklist-item');
  item.classList.toggle('checked', checked);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModals(); });

// Boot — load from Supabase, then render
initMap();
loadAllData().then(() => {
  renderSidebar();
  renderMap();
  setupRealtime();
}).catch(err => {
  console.warn('Supabase load failed, starting with empty state:', err);
  renderSidebar();
  renderMap();
});
</script>
</body>
</html>
