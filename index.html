<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Honeymoon 2026 — Mando & Rim</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --card: #334155; --card-hover: #3b4d66;
    --border: #475569; --text: #f1f5f9; --muted: #94a3b8; --accent: #f59e0b;
    --beach: #38bdf8; --mountain: #4ade80; --city: #c084fc; --ryokan: #fbbf24;
    --cultural: #fb923c; --travel: #94a3b8; --scenic: #2dd4bf;
    --sidebar-w: 420px;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.35);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.25);
    --font-body: 'DM Sans', -apple-system, 'Segoe UI', system-ui, sans-serif;
    --font-jp: 'Noto Serif JP', serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(180deg, var(--surface) 0%, rgba(30,41,59,0.95) 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 20px; flex-shrink: 0; z-index: 1000;
    backdrop-filter: blur(12px);
  }
  header h1 { font-size: 17px; font-weight: 600; white-space: nowrap; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); font-weight: 700; }
  header h1 .jp-text { font-family: var(--font-jp); font-size: 13px; color: var(--muted); margin-left: 8px; font-weight: 400; opacity: 0.7; }

  .header-stats { display: flex; gap: 16px; font-size: 12px; color: var(--muted); font-weight: 500; }
  .header-stats .stat { display: flex; align-items: center; gap: 5px; }

  .header-actions { display: flex; gap: 6px; }
  .header-actions button {
    padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--card); color: var(--text); cursor: pointer; font-size: 12px;
    font-family: var(--font-body); font-weight: 500; transition: all 0.2s ease;
  }
  .header-actions button:hover { background: var(--card-hover); border-color: var(--accent); transform: translateY(-1px); }

  .view-toggle { display: flex; background: var(--bg); border-radius: var(--radius-sm); padding: 2px; gap: 2px; }
  .view-toggle button {
    padding: 5px 14px; border: none; border-radius: 6px; background: transparent;
    color: var(--muted); cursor: pointer; font-size: 12px; font-family: var(--font-body);
    font-weight: 600; transition: all 0.2s ease; letter-spacing: 0.3px;
  }
  .view-toggle button.active { background: var(--accent); color: #0f172a; }
  .view-toggle button:not(.active):hover { color: var(--text); }

  /* ─── PROGRESS INDICATOR ─── */
  .day-progress {
    display: flex; align-items: center; gap: 10px; padding: 0 6px;
    animation: fadeSlideIn 0.3s ease;
  }
  .day-progress-text { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); white-space: nowrap; }
  .day-progress-bar { flex: 1; height: 3px; background: var(--bg); border-radius: 2px; min-width: 60px; overflow: hidden; }
  .day-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  /* ─── MAIN LAYOUT ─── */
  .main { display: flex; flex: 1; overflow: hidden; position: relative; }

  #sidebar {
    width: var(--sidebar-w); background: var(--surface); overflow-y: auto;
    border-right: 1px solid var(--border); flex-shrink: 0; scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #sidebar::-webkit-scrollbar { width: 5px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }

  /* ─── DAY CARDS ─── */
  .day-card {
    padding: 14px 18px; border-bottom: 1px solid rgba(71,85,105,0.5);
    cursor: pointer; transition: all 0.25s ease; position: relative;
  }
  .day-card:hover { background: rgba(51,65,85,0.5); }
  .day-card.active {
    background: linear-gradient(135deg, rgba(51,65,85,0.8) 0%, rgba(30,41,59,0.9) 100%);
    border-left: 3px solid var(--accent);
  }
  .day-card-header { display: flex; align-items: center; gap: 12px; }
  .day-num {
    width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); transition: transform 0.2s ease;
  }
  .day-card:hover .day-num { transform: scale(1.08); }
  .day-info { flex: 1; min-width: 0; }
  .day-date { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .day-title { font-size: 14px; font-weight: 600; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.2px; }
  .day-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 400; }
  .type-badge {
    font-size: 9px; font-weight: 700; padding: 3px 10px; border-radius: 12px;
    text-transform: uppercase; letter-spacing: 0.8px; flex-shrink: 0;
  }
  .day-driving { font-size: 11px; color: var(--muted); margin-top: 6px; display: flex; align-items: center; gap: 5px; line-height: 1.4; }

  /* ─── DAY DETAIL (EXPANDED) ─── */
  .day-detail { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
  .day-card.active .day-detail { max-height: 4000px; }
  .day-detail-inner { padding: 16px 0 8px; }

  .detail-image {
    width: 100%; height: 190px; border-radius: var(--radius); overflow: hidden;
    background: var(--bg); position: relative; margin-bottom: 16px;
    box-shadow: var(--shadow-md);
  }
  .detail-image img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.6s ease; }
  .detail-image .img-placeholder {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--muted); position: absolute; top: 0; left: 0; font-weight: 500;
  }

  .detail-section { margin-bottom: 16px; }
  .detail-section-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 1px solid rgba(71,85,105,0.4);
    display: flex; align-items: center; gap: 6px;
  }
  .detail-section-title .section-icon {
    width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center;
    justify-content: center; font-size: 10px; flex-shrink: 0;
  }
  .detail-section ul { list-style: none; padding: 0; }
  .detail-section li {
    font-size: 13px; padding: 4px 0; padding-left: 18px; position: relative; line-height: 1.6;
  }
  .detail-section li::before {
    content: ''; position: absolute; left: 2px; top: 11px; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent);
  }
  .detail-section.food li::before { background: var(--cultural); }
  .detail-section.photo li::before { background: var(--city); }
  .detail-section.drives li::before { background: var(--travel); }

  /* ─── ACCOMMODATION CARD ─── */
  .detail-accommodation {
    background: linear-gradient(135deg, rgba(15,23,42,0.9) 0%, rgba(30,41,59,0.6) 100%);
    border-radius: var(--radius); padding: 14px 16px;
    border: 1px solid var(--border);
    margin-bottom: 14px; position: relative; overflow: hidden;
  }
  .detail-accommodation::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .detail-accommodation .accom-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .detail-accommodation .name { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
  .detail-accommodation .price { font-size: 16px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .detail-accommodation .accom-type { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .detail-accommodation .booking-badge {
    display: inline-flex; align-items: center; gap: 4px; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; padding: 3px 10px; border-radius: 10px;
    margin-bottom: 6px;
  }
  .booking-badge.booked { background: rgba(74,222,128,0.15); color: #4ade80; }
  .booking-badge.pending { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .booking-badge.flight { background: rgba(148,163,184,0.15); color: #94a3b8; }

  .detail-links { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .detail-links a {
    padding: 7px 14px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 500;
    text-decoration: none; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    transition: all 0.2s ease; display: flex; align-items: center; gap: 5px;
  }
  .detail-links a:hover { background: var(--card-hover); border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

  /* ─── MAP ─── */
  #map-container { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; z-index: 1; }
  .leaflet-container { background: var(--bg); }

  .custom-marker {
    width: 30px; height: 30px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.9);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
    box-shadow: 0 3px 12px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.1);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .custom-marker:hover { transform: scale(1.2); box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
  .custom-marker.active { transform: scale(1.35); box-shadow: 0 0 0 4px rgba(245,158,11,0.5), 0 4px 16px rgba(0,0,0,0.5); }

  /* ─── CALENDAR VIEW ─── */
  #calendar-container {
    flex: 1; overflow-y: auto; background: var(--bg); padding: 32px;
    display: none;
  }
  .calendar-month-title {
    font-family: var(--font-jp); font-size: 28px; font-weight: 700; text-align: center;
    margin-bottom: 6px; color: var(--text); letter-spacing: 1px;
  }
  .calendar-month-subtitle { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 24px; font-weight: 500; letter-spacing: 0.5px; }
  .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
    max-width: 900px; margin: 0 auto;
  }
  .calendar-header-cell {
    text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); padding: 8px 0;
  }
  .calendar-cell {
    min-height: 100px; border-radius: var(--radius-sm); padding: 8px 10px;
    border: 1px solid var(--border); background: var(--surface);
    transition: all 0.2s ease; position: relative; cursor: default;
  }
  .calendar-cell.empty { background: transparent; border-color: transparent; }
  .calendar-cell.dimmed { opacity: 0.3; }
  .calendar-cell.trip-day {
    cursor: pointer; border-width: 2px;
  }
  .calendar-cell.trip-day:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .calendar-cell.trip-day.active { box-shadow: 0 0 0 2px var(--accent), var(--shadow-md); }
  .calendar-cell .cal-date {
    font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 4px;
  }
  .calendar-cell.trip-day .cal-date { color: var(--text); }
  .calendar-cell .cal-icon { font-size: 18px; margin-bottom: 2px; }
  .calendar-cell .cal-location { font-size: 10px; font-weight: 600; line-height: 1.3; margin-bottom: 3px; }
  .calendar-cell .cal-accom { font-size: 9px; color: var(--muted); line-height: 1.3; font-weight: 400; }
  .calendar-cell .cal-type-dot {
    position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 50%;
  }

  /* ─── MODALS ─── */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75);
    z-index: 2000; display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border-radius: 16px; padding: 32px; max-width: 700px;
    width: 90%; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal h2 { font-size: 22px; margin-bottom: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .budget-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .budget-table th { text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .budget-table td { padding: 8px 12px; border-bottom: 1px solid rgba(71,85,105,0.4); }
  .budget-table .total td { font-weight: 700; border-top: 2px solid var(--accent); color: var(--accent); font-size: 15px; }
  .budget-bar { height: 6px; border-radius: 3px; background: var(--bg); margin-top: 4px; overflow: hidden; }
  .budget-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

  .modal-close-btn {
    margin-top: 20px; padding: 10px 24px; background: var(--accent); color: #0f172a; border: none;
    border-radius: var(--radius-sm); cursor: pointer; font-weight: 700; font-family: var(--font-body);
    font-size: 13px; transition: all 0.2s ease; letter-spacing: 0.3px;
  }
  .modal-close-btn:hover { background: #fbbf24; transform: translateY(-1px); }

  .checklist-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(71,85,105,0.4); transition: opacity 0.2s; }
  .checklist-item input[type="checkbox"] { margin-top: 3px; accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
  .checklist-item label { font-size: 13px; line-height: 1.5; cursor: pointer; }
  .checklist-item.checked label { text-decoration: line-through; color: var(--muted); }
  .checklist-section { margin-bottom: 24px; }
  .checklist-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--accent); letter-spacing: 0.3px; }

  .booking-progress { background: var(--card); border-radius: var(--radius); padding: 18px; margin-bottom: 24px; }
  .booking-progress-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin: 10px 0; }
  .booking-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--mountain)); border-radius: 4px; transition: width 0.6s ease; }
  .booking-progress-stats { display: flex; gap: 24px; font-size: 13px; flex-wrap: wrap; }
  .booking-progress-stats .bp-stat { display: flex; flex-direction: column; gap: 2px; }
  .booking-progress-stats .bp-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .booking-progress-stats .bp-value { font-weight: 700; font-size: 16px; }
  .booking-progress-stats .bp-value.accent { color: var(--accent); }

  .booking-group { margin-bottom: 24px; }
  .booking-group-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .booking-group-title .priority { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .priority-now { background: #ef444433; color: #f87171; }
  .priority-soon { background: #f59e0b33; color: #fbbf24; }
  .priority-later { background: #22c55e33; color: #4ade80; }
  .priority-cancel { background: #ef444433; color: #f87171; }

  .booking-item {
    background: var(--card); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
    border-left: 3px solid var(--border); transition: all 0.2s;
  }
  .booking-item.done { border-left-color: var(--mountain); opacity: 0.8; }
  .booking-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .booking-item-header input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--mountain); cursor: pointer; flex-shrink: 0; }
  .booking-item-header .bi-text { flex: 1; font-size: 14px; font-weight: 500; }
  .booking-item-header .bi-est { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .booking-item.done .bi-text { text-decoration: line-through; color: var(--muted); }
  .booking-item-details { font-size: 12px; color: var(--muted); margin-bottom: 8px; padding-left: 28px; line-height: 1.5; }
  .booking-inputs { display: flex; gap: 8px; padding-left: 28px; flex-wrap: wrap; }
  .booking-inputs .bi-field { display: flex; flex-direction: column; gap: 3px; }
  .booking-inputs .bi-field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); font-weight: 600; }
  .booking-inputs .bi-field input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 10px; color: var(--text); font-size: 13px; font-family: var(--font-body);
    transition: border-color 0.2s;
  }
  .booking-inputs .bi-field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(245,158,11,0.15); }
  .booking-inputs .bi-field input.price-input { width: 110px; }
  .booking-inputs .bi-field input.conf-input { width: 160px; }
  .booking-inputs .bi-field input.notes-input { width: 220px; }

  @media (max-width: 768px) {
    .main { flex-direction: column; }
    #sidebar { width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
    #map-container { height: 55vh; }
    #calendar-container { height: 55vh; }
    .header-stats { display: none; }
    .day-progress { display: none; }
    header { padding: 0 16px; gap: 10px; }
    .modal { padding: 20px; }
    .calendar-grid { gap: 3px; }
    .calendar-cell { min-height: 70px; padding: 4px 6px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Japan <span>2026</span><span class="jp-text">日本の新婚旅行</span></h1>
    <div class="header-stats" id="headerStats"></div>
    <div id="dayProgress"></div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
      <div class="view-toggle" id="viewToggle">
        <button class="active" onclick="setView('map')">Map</button>
        <button onclick="setView('calendar')">Calendar</button>
      </div>
      <div class="header-actions">
        <button onclick="showModal('budget')">&#128176; Budget</button>
        <button onclick="showModal('bookings')">&#128203; Bookings</button>
        <button onclick="showModal('checklist')">&#127890; Packing</button>
      </div>
    </div>
  </header>
  <div class="main">
    <div id="sidebar"></div>
    <div id="map-container">
      <div id="map"></div>
    </div>
    <div id="calendar-container"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-budget" onclick="if(event.target===this)closeModals()">
  <div class="modal" id="budgetContent"></div>
</div>
<div class="modal-overlay" id="modal-bookings" onclick="if(event.target===this)closeModals()">
  <div class="modal" id="bookingsContent" style="max-width:800px"></div>
</div>
<div class="modal-overlay" id="modal-checklist" onclick="if(event.target===this)closeModals()">
  <div class="modal" id="checklistContent"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─── Supabase setup ───
const SUPABASE_URL = 'https://drfytajbstwiookwbxsv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YCpu9qa6RJoxiWvRyEoOnA_N1Ckydfx';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let _bookingData = {};
let _checklistData = {};

async function loadAllData() {
  const [bookings, checklist] = await Promise.all([
    sb.from('bookings').select('*'),
    sb.from('checklist').select('*'),
  ]);
  if (bookings.data) bookings.data.forEach(r => {
    _bookingData[r.id] = { done: r.done, actual: r.actual, notes: r.notes, conf: r.conf };
  });
  if (checklist.data) checklist.data.forEach(r => { _checklistData[r.id] = r.checked; });
}

function setupRealtime() {
  sb.channel('sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'bookings' }, (payload) => {
      if (payload.new) _bookingData[payload.new.id] = { done: payload.new.done, actual: payload.new.actual, notes: payload.new.notes, conf: payload.new.conf };
      if (payload.old && payload.eventType === 'DELETE') delete _bookingData[payload.old.id];
      renderBookings();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'checklist' }, (payload) => {
      if (payload.new) _checklistData[payload.new.id] = payload.new.checked;
      if (payload.old && payload.eventType === 'DELETE') delete _checklistData[payload.old.id];
      renderChecklist();
    })
    .subscribe();
}

// ─── MAP & UI STATE ───
let activeDay = null;
let currentView = 'map';
let map, markers = [], routeLine, imageCache = {};

function getDays() { return DAYS; }

// ─── VIEW TOGGLE ───
function setView(view) {
  currentView = view;
  document.querySelectorAll('#viewToggle button').forEach(b => b.classList.remove('active'));
  document.querySelector(`#viewToggle button[onclick="setView('${view}')"]`).classList.add('active');

  const mapContainer = document.getElementById('map-container');
  const calContainer = document.getElementById('calendar-container');

  if (view === 'map') {
    mapContainer.style.display = 'block';
    calContainer.style.display = 'none';
    map.invalidateSize();
  } else {
    mapContainer.style.display = 'none';
    calContainer.style.display = 'block';
    renderCalendar();
  }
}

// ─── CALENDAR ───
function renderCalendar() {
  const container = document.getElementById('calendar-container');
  // August 2026: starts on Saturday (day 6), 31 days
  const startDayOfWeek = 6; // Saturday = 6
  const daysInMonth = 31;

  const dayHeaders = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Build lookup: date number -> DAYS entry
  const dayMap = {};
  DAYS.forEach(d => {
    const dateNum = parseInt(d.date.replace(/\D+/g,' ').trim().split(' ').pop() || d.date.match(/\d+/)?.[0]);
    // Parse from "Thu, Aug 7" format
    const match = d.date.match(/(\d+)/);
    if (match) dayMap[parseInt(match[1])] = d;
  });

  let cells = '';

  // Header cells
  dayHeaders.forEach(h => {
    cells += `<div class="calendar-header-cell">${h}</div>`;
  });

  // Empty cells before Aug 1
  for (let i = 0; i < startDayOfWeek; i++) {
    cells += `<div class="calendar-cell empty"></div>`;
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const tripDay = dayMap[d];
    const isTripDay = !!tripDay;
    const isActive = isTripDay && activeDay === tripDay.day;
    const isDimmed = !isTripDay;

    if (isTripDay) {
      const color = TYPE_COLORS[tripDay.type] || '#94a3b8';
      const icon = DAY_ICONS[tripDay.type] || '';
      const accomName = tripDay.accom.name.replace(/ \u2705/g, '').split(' — ')[0];
      cells += `
        <div class="calendar-cell trip-day ${isActive ? 'active' : ''}" style="border-color:${color}44;background:linear-gradient(135deg,${color}10,${color}06)"
             onclick="selectDay(${tripDay.day})">
          <div class="cal-type-dot" style="background:${color}"></div>
          <div class="cal-date">${d}</div>
          <div class="cal-icon">${icon}</div>
          <div class="cal-location" style="color:${color}">${tripDay.title.replace('Drive to ','').replace('Back to ','')}</div>
          <div class="cal-accom">${accomName}</div>
        </div>`;
    } else {
      cells += `
        <div class="calendar-cell ${isDimmed ? 'dimmed' : ''}">
          <div class="cal-date">${d}</div>
        </div>`;
    }
  }

  container.innerHTML = `
    <div class="calendar-month-title">八月 2026</div>
    <div class="calendar-month-subtitle">AUGUST — JAPAN HONEYMOON</div>
    <div class="calendar-grid">${cells}</div>
  `;
}

// ─── MAP ───
function initMap() {
  map = L.map('map', { zoomControl: false }).setView([36.0, 138.5], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 18
  }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);
}

function getMarkerIcon(day, isActive) {
  const color = BASE_COLORS[day.base] || '#94a3b8';
  return L.divIcon({
    className: 'custom-marker-wrap',
    html: `<div class="custom-marker ${isActive?'active':''}" style="background:${color}">${day.day}</div>`,
    iconSize: [30, 30], iconAnchor: [15, 15]
  });
}

function renderMap() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (routeLine) map.removeLayer(routeLine);

  const days = getDays();
  const coords = [];

  days.forEach(day => {
    const marker = L.marker(day.coords, { icon: getMarkerIcon(day, activeDay === day.day) })
      .addTo(map)
      .bindTooltip(`Day ${day.day}: ${day.title}`, { direction: 'top', offset: [0, -18] })
      .on('click', () => selectDay(day.day));
    markers.push(marker);
    coords.push(day.coords);
  });

  const lineCoords = [coords[0]];
  for (let i = 1; i < coords.length; i++) {
    if (coords[i][0] !== coords[i-1][0] || coords[i][1] !== coords[i-1][1]) {
      lineCoords.push(coords[i]);
    }
  }

  routeLine = L.polyline(lineCoords, {
    color: '#f59e0b', weight: 2.5, opacity: 0.5, dashArray: '8 6'
  }).addTo(map);

  if (!activeDay) {
    map.fitBounds(L.latLngBounds(coords), { padding: [40, 40] });
  }
}

// ─── HEADER STATS & PROGRESS ───
function updateHeaderStats() {
  const days = getDays();
  const totalAccom = days.reduce((s, d) => s + d.accom.price, 0);
  const beachDays = days.filter(d => d.type === 'beach').length;
  const ryokanNights = days.filter(d => d.accom.type.toLowerCase().includes('ryokan')).length;
  const driveDays = days.filter(d => d.driving && !d.driving.includes('No driving')).length;

  document.getElementById('headerStats').innerHTML = `
    <div class="stat">&#128197; ${days.length} days / 15 nights</div>
    <div class="stat">&#127754; ${beachDays} beach</div>
    <div class="stat">&#128663; ${driveDays} drive days</div>
    <div class="stat">&#128176; ~CA$${totalAccom.toLocaleString()} lodging (est.)</div>
  `;

  updateDayProgress();
}

function updateDayProgress() {
  const el = document.getElementById('dayProgress');
  if (!activeDay) { el.innerHTML = ''; return; }
  const total = getDays().length;
  const pct = Math.round((activeDay / total) * 100);
  el.innerHTML = `
    <div class="day-progress">
      <span class="day-progress-text">Day ${activeDay} of ${total}</span>
      <div class="day-progress-bar"><div class="day-progress-fill" style="width:${pct}%"></div></div>
    </div>
  `;
}

  const days = getDays();
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = days.map(day => {
    const color = TYPE_COLORS[day.type] || '#94a3b8';
    const isActive = activeDay === day.day;
    const accomText = day.accom.type;
    const isBooked = accomText.startsWith('BOOKED');
    const isPending = accomText.startsWith('PENDING');
    const bookingStatus = isBooked ? 'booked' : isPending ? 'pending' : 'flight';
    const bookingLabel = isBooked ? 'Booked' : isPending ? 'Pending' : (day.type === 'travel' ? 'Flight' : '');
    const accomBarColor = BASE_COLORS[day.base] || color;

    return `
      <div class="day-card ${isActive ? 'active' : ''}" id="day-${day.day}" onclick="selectDay(${day.day})">

              <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${accomBarColor};border-radius:${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--radius'))}px ${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--radius'))}px 0 0"></div>

                <div class="name">${day.accom.name}</div>

            <div class="detail-links">
              <a href="https://www.google.com/maps/search/${encodeURIComponent(day.title + ' Japan')}" target="_blank">&#127758; Google Maps</a>

              <a href="https://www.google.com/search?tbm=isch&q=${encodeURIComponent(day.title + ' ' + day.subtitle + ' Japan')}" target="_blank">&#128247; Photos</a>
              <a href="https://en.wikipedia.org/wiki/${day.wiki}" target="_blank">&#128214; Wiki</a>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  updateHeaderStats();
}

function selectDay(dayNum) {
  if (activeDay === dayNum) { activeDay = null; }
  else { activeDay = dayNum; }

  renderSidebar();
  renderMap();
  if (currentView === 'calendar') renderCalendar();

  if (activeDay) {
    const day = getDays().find(d => d.day === dayNum);
    map.flyTo(day.coords, day.type === 'travel' ? 8 : 12, { duration: 0.8 });

    setTimeout(() => {
      const el = document.getElementById(`day-${dayNum}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);

    loadImage(dayNum, day.wiki);
  }
}

async function loadImage(dayNum, wikiTitle) {
  if (imageCache[wikiTitle]) { setImage(dayNum, imageCache[wikiTitle]); return; }
  try {
    const resp = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`);
    const data = await resp.json();
    const url = data.originalimage?.source || data.thumbnail?.source;
    if (url) { imageCache[wikiTitle] = url; setImage(dayNum, url); }
  } catch(e) {}
}

function setImage(dayNum, url) {
  const container = document.getElementById(`img-${dayNum}`);
  if (!container) return;
  const img = document.createElement('img');
  img.src = url; img.alt = ''; img.style.opacity = '0';
  img.onload = () => { img.style.opacity = '1'; };
  const placeholder = container.querySelector('.img-placeholder');
  if (placeholder) placeholder.style.display = 'none';
  container.appendChild(img);
}

// ─── MODALS ───
function showModal(type) {
  closeModals();
  if (type === 'budget') renderBudget();
  if (type === 'bookings') renderBookings();

  document.getElementById(`modal-${type}`).classList.add('show');
}
function closeModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
}

function saveField(id, field, value) {
  if (!_bookingData[id]) _bookingData[id] = {};
  if (field === 'actual') _bookingData[id][field] = value === '' ? null : parseFloat(value);
  else if (field === 'done') _bookingData[id][field] = value;
  else _bookingData[id][field] = value;
  const d = _bookingData[id];
  sb.from('bookings').upsert({ id, done: d.done || false, actual: d.actual || null, notes: d.notes || null, conf: d.conf || null, updated_at: new Date().toISOString() }).then();
}

function handleCheckbox(id, el) {
  saveField(id, 'done', el.checked);
  const card = el.closest('.booking-item');
  if (card) card.classList.toggle('done', el.checked);
}

function renderBookings() {
  const data = _bookingData;
  const allItems = BOOKINGS.flatMap(g => g.items);
  const doneCount = allItems.filter(i => data[i.id]?.done).length;
  const pct = Math.round((doneCount / allItems.length) * 100);

  document.getElementById('bookingsContent').innerHTML = `
    <h2>Bookings Tracker</h2>
    <div class="booking-progress">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:14px;font-weight:600">${doneCount} of ${allItems.length} done</span>
        <span style="font-size:14px;font-weight:700;color:var(--accent)">${pct}%</span>
      </div>
      <div class="booking-progress-bar">
        <div class="booking-progress-fill" style="width:${pct}%"></div>
      </div>
    </div>

    ${BOOKINGS.map(group => `
      <div class="booking-group">
        <div class="booking-group-title">
          ${group.group}
          <span class="priority priority-${group.priority}">${group.priorityLabel}</span>
        </div>
        ${group.items.map(item => {
          const d = data[item.id] || {};
          return `
          <div class="booking-item ${d.done ? 'done' : ''}">
            <div class="booking-item-header">
              <input type="checkbox" ${d.done ? 'checked' : ''} onchange="handleCheckbox('${item.id}',this)">
              <span class="bi-text">${item.text}</span>
              ${item.est > 0 ? `<span class="bi-est">CA$${item.est.toLocaleString()}</span>` : ''}
            </div>
            <div class="booking-item-details">${item.detail}</div>
            <div class="booking-inputs">
              <div class="bi-field">
                <label>Actual Price (CAD)</label>
                <input type="number" class="price-input" placeholder="0.00" value="${d.actual != null ? d.actual : ''}" onchange="saveField('${item.id}','actual',this.value)">
              </div>
              <div class="bi-field">
                <label>Confirmation #</label>
                <input type="text" class="conf-input" placeholder="Booking ref..." value="${d.conf || ''}" onchange="saveField('${item.id}','conf',this.value)">
              </div>
              <div class="bi-field">
                <label>Notes</label>
                <input type="text" class="notes-input" placeholder="Any notes..." value="${d.notes || ''}" onchange="saveField('${item.id}','notes',this.value)">
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `).join('')}

    <div style="display:flex;gap:8px;margin-top:20px">
      <button class="modal-close-btn" onclick="closeModals()">Close</button>
      <button onclick="exportBookings()" style="padding:10px 20px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-weight:500;font-size:12px;font-family:var(--font-body);transition:all 0.2s">Copy Summary</button>
    </div>
  `;
}

function exportBookings() {
  const data = _bookingData;
  const lines = ['JAPAN HONEYMOON 2026 \u2014 BOOKING STATUS\n'];
  BOOKINGS.forEach(group => {
    lines.push(`\n## ${group.group}`);
    group.items.forEach(item => {
      const d = data[item.id] || {};
      const status = d.done ? '\u2705' : '\u2B1C';
      const price = d.actual ? `CA$${d.actual}` : item.est > 0 ? `~CA$${item.est} (est.)` : '';
      const conf = d.conf ? ` | Conf: ${d.conf}` : '';
      lines.push(`${status} ${item.text} ${price}${conf}`);
    });
  });
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy Summary', 2000);
  });
}

function toggleCheck(id, checked) {
  _checklistData[id] = checked;
  sb.from('checklist').upsert({ id, checked, updated_at: new Date().toISOString() }).then();

  item.classList.toggle('checked', checked);
}
